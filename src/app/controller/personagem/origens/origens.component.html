<app-card-search
  name="Origens"
  [service]="origemService"
  [searchColumn]="['nome']"
  [colsGrid]="3"
  [suggestions]="['heroica', 'regional', 'mundana']"
  [columns]="[
    { key: 'nome', label: 'Nome' },
    { key: 'tipo', label: 'Tipo' },
  ]"
  gutterSizeGrid="10px">
  <ng-template let-item>
    <mat-card class="card-game">
      <mat-card-title class="mat-card-title">
        {{ item.nome.toUpperCase() }}
      </mat-card-title>
      <mat-card-content class="">
        <div class="row">
          <div class="col-sm-12 mt-1 d-flex justify-content-end">
            {{ item.referencias + ', pag. ' + item.paginas }}
          </div>
        </div>
        <div class="row">
          <div class="col-sm-12">
            <hr />
          </div>
        </div>
        <div class="content mt-2">
          <div class="row">
            <div class="col-sm-12 mt-4">
              <div style="text-align: justify; margin-bottom: 1em; line-height: 1.6">
                <div class="text-justify" [innerHTML]="item.descricao"></div>
              </div>
            </div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </ng-template>
</app-card-search>
