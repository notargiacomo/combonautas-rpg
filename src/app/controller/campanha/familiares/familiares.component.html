<app-card-search
  name="Familiares"
  [service]="service"
  [searchColumn]="['nome']"
  [colsGrid]="4"
  [rowHeight]="300"
  [suggestions]="[]"
  gutterSizeGrid="10px">
  <ng-template let-item>
    <mat-card class="card-game">
      <mat-card-title class="mat-card-title">
        {{ item.nome.toUpperCase() }}
      </mat-card-title>
      <mat-card-content class="">
        <div class="row mt-2">
          <div class="col-sm-12 mt-1 d-flex justify-content-end">
            {{ item.referencias }}
          </div>
        </div>
        <div class="row">
          <div class="col-sm-12">
            <hr />
          </div>
        </div>
        <div class="content">
          <div class="row">
            <div class="col-sm-12">
              <div style="text-align: justify; margin-bottom: 1em; line-height: 1.6">
                <div class="text-justify" [innerHTML]="item.beneficio"></div>
              </div>
            </div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </ng-template>
</app-card-search>
