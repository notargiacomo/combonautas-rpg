<app-card-search
  name="Acoes"
  [service]="servico"
  [searchColumn]="['nome', 'descricao']"
  [colsGrid]="3"
  [rowHeight]="350"
  [suggestions]="[]"
  gutterSizeGrid="10px">
  <ng-template let-item>
    <mat-card class="card-game">
      <mat-card-title class="titulo-cartao-apresentacao interior-cartao interior-cartao-condicoes">
        {{ item.nome }}
      </mat-card-title>
      <mat-card-content class="interior-cartao interior-cartao-condicoes content-cartao-condicoes">
        <div class="row">
          <div class="col-sm-12 mt-1 d-flex justify-content-end">
            {{ item.custo }}
          </div>
        </div>
        <div class="row">
          <div class="col-sm-12">
            <hr class="" />
          </div>
        </div>
        <div class="content">
          <div class="row">
            <div class="col-sm-12" [innerHTML]="item.descricao"></div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </ng-template>
</app-card-search>
