<app-card-search
  name="Condições"
  [service]="service"
  [searchColumn]="['nome', 'descricao', 'tipo']"
  [colsGrid]="3"
  [rowHeight]="350"
  [suggestions]="['Medo', 'Movimento', 'Mental', 'Sentidos', 'Metabolismo', 'Veneno', 'Cansaço', 'Metamorfose']"
  gutterSizeGrid="10px">
  <ng-template let-item>
    <mat-card class="card-game">
      <mat-card-title class="">
        {{ item.nome }}
      </mat-card-title>
      <mat-card-content class="">
        <div class="row">
          <div class="col-sm-12 mt-1 d-flex justify-content-end">
            {{ item.tipo }}
          </div>
        </div>
        <div class="row">
          <div class="col-sm-12">
            <hr class="" />
          </div>
        </div>
        <div class="content">
          <div class="row">
            <div class="col-sm-12 mt-4">
              {{ item.descricao }}
            </div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </ng-template>
</app-card-search>
